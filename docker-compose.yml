services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-courrier}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    expose:
      - "4000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/courrier?sslmode=disable}
      PORT: ${PORT:-4000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      STORAGE_DIR: ${STORAGE_DIR:-/data}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      DOMAINS: ${DOMAINS:-http://localhost:3000,http://127.0.0.1:3000}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      OIDC_SUCCESS_URL: ${OIDC_SUCCESS_URL:-}
      SSO_ONLY: ${SSO_ONLY:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_data:/data

  client:
    build:
      context: apps/client
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:4000}
      network: host
    expose:
      - "80"
    depends_on:
      - api

volumes:
  db_data:
    name: courrier_db_data
  api_data:
    name: courrier_api_data
